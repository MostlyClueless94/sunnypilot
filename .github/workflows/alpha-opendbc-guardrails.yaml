name: alpha opendbc guardrails

on:
  push:
    branches:
      - alpha
  pull_request:
    branches:
      - alpha

jobs:
  safety_tests:
    name: opendbc safety
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - run: ./tools/op.sh setup
      - name: Run opendbc safety tests
        run: ./opendbc_repo/opendbc/safety/tests/test.sh

  mutation_tests:
    name: opendbc mutation
    runs-on: ubuntu-24.04
    env:
      GIT_REF: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.before || format('origin/{0}', github.event.repository.default_branch) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - run: ./tools/op.sh setup
      - name: Run opendbc mutation tests
        run: ./opendbc_repo/opendbc/safety/tests/mutation.sh
