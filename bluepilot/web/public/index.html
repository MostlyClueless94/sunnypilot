    <!-- WebGL Capability Detection -->
    <script>
      // Check WebGL support on page load
      window.webglSupport = (function () {
        try {
          const canvas = document.createElement("canvas");
          const gl =
            canvas.getContext("webgl") ||
            canvas.getContext("experimental-webgl");
          if (gl) {
            const vendor = gl.getParameter(gl.VENDOR);
            const renderer = gl.getParameter(gl.RENDERER);
            console.log("WebGL detected:", { vendor, renderer });
            return { supported: true, vendor, renderer };
          }
        } catch (e) {
          console.warn("WebGL detection failed:", e);
        }
        return { supported: false, error: "WebGL not available" };
      })();
    </script>

    <!-- Video Player Libraries Loader -->
    <script>
      const HLS_LOCAL_SRC = "/vendor/hls/hls.min.js";
      const H265_LOCAL_BASE = "/vendor/h265-web-player/";

      window.__h265UseCdn = false;

      function loadScriptWithFallback(localSrc, onLocalFail) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = localSrc;
          script.onload = () => resolve("local");
          script.onerror = () => {
            console.warn(`Failed to load ${localSrc}`);
            if (typeof onLocalFail === "function") {
              try {
                onLocalFail();
              } catch (e) {
                console.warn("onLocalFail handler threw:", e);
              }
            }
            // For React app, we just log the error and continue
            // The app will handle missing libraries gracefully
            resolve("failed");
          };
          document.head.appendChild(script);
        });
      }

      (async function initPlayers() {
        try {
          // Load HLS.js
          await loadScriptWithFallback(HLS_LOCAL_SRC);

          // Setup Module for h265-web-player WASM
          window.Module = window.Module || {};
          window.Module.locateFile = function (path) {
            if (path.endsWith(".wasm") || path.endsWith(".data")) {
              return H265_LOCAL_BASE + path;
            }
            return path;
          };

          // Global canvas variable for h265-web-player compatibility
          window.canvas = null;

          // Load h265-web-player scripts in order
          await loadScriptWithFallback(`${H265_LOCAL_BASE}webgl.js`);
          await loadScriptWithFallback(`${H265_LOCAL_BASE}pcm-player.js`);
          await loadScriptWithFallback(`${H265_LOCAL_BASE}decoder.js`);
          await loadScriptWithFallback(`${H265_LOCAL_BASE}player.js`);

          console.log("Video player libraries loaded successfully");
        } catch (error) {
          console.error("Error loading media dependencies:", error);
        }
      })();
    </script>
